<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#0d1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Rajdeep Furnitures"/>
  <meta name="description" content="Rajdeep Furnitures – Customer & Service Field Notes"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/jpeg" href="icon.jpg"/>
  <link rel="apple-touch-icon" href="icon.jpg"/>
  <title>Rajdeep Furnitures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 18px;
      --font: 'DM Sans', sans-serif;
      --font-serif: 'DM Serif Display', serif;
      --ease: cubic-bezier(0.4,0,0.2,1);
      --spring: cubic-bezier(0.34,1.56,0.64,1);
    }

    [data-theme="dark"] {
      --bg:        #0d1117;
      --bg2:       #111827;
      --surf:      #161d2e;
      --surf2:     #1e2740;
      --surf3:     #232e4a;
      --b1:        rgba(255,255,255,0.065);
      --b2:        rgba(255,255,255,0.115);
      --b3:        rgba(255,255,255,0.18);
      --t1:        #f0f4ff;
      --t2:        #9eabcc;
      --t3:        #5a6b8a;
      --t4:        #3a4a66;
      --accent:    #4a90d9;
      --accentH:   #3578c4;
      --accentD:   rgba(74,144,217,0.12);
      --accentB:   rgba(74,144,217,0.28);
      --green:     #4a90d9;
      --greenD:    rgba(74,144,217,0.10);
      --greenB:    rgba(74,144,217,0.22);
      --amber:     #c0392b;
      --amberD:    rgba(192,57,43,0.12);
      --amberB:    rgba(192,57,43,0.28);
      --red:       #ef4444;
      --redD:      rgba(239,68,68,0.10);
      --shadow:    0 4px 24px rgba(0,0,0,0.30);
      --shadowLg:  0 16px 48px rgba(0,0,0,0.45);
      --meta-color:#23d366;
    }

    [data-theme="light"] {
      --bg:        #f4f6fb;
      --bg2:       #eaecf5;
      --surf:      #ffffff;
      --surf2:     #f7f9fd;
      --surf3:     #eef1f8;
      --b1:        rgba(0,0,0,0.07);
      --b2:        rgba(0,0,0,0.11);
      --b3:        rgba(0,0,0,0.18);
      --t1:        #0f172a;
      --t2:        #475569;
      --t3:        #94a3b8;
      --t4:        #c8d3e6;
      --accent:    #2c6fad;
      --accentH:   #1d5a94;
      --accentD:   rgba(44,111,173,0.08);
      --accentB:   rgba(44,111,173,0.22);
      --green:     #2c6fad;
      --greenD:    rgba(44,111,173,0.08);
      --greenB:    rgba(44,111,173,0.18);
      --amber:     #a93226;
      --amberD:    rgba(169,50,38,0.08);
      --amberB:    rgba(169,50,38,0.18);
      --red:       #dc2626;
      --redD:      rgba(220,38,38,0.08);
      --shadow:    0 4px 16px rgba(0,0,0,0.09);
      --shadowLg:  0 16px 40px rgba(0,0,0,0.14);
      --meta-color:#15803d;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:15px;-webkit-tap-highlight-color:transparent}
    body{
      font-family:var(--font);
      background:var(--bg);
      color:var(--t1);
      height:100dvh;
      overflow:hidden;
      transition:background .22s var(--ease),color .22s var(--ease);
    }
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
    button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
    input,textarea,select{font-family:inherit}

    /* ─── LAYOUT ─── */
    #app{
      display:flex;flex-direction:column;
      height:100dvh;max-width:520px;margin:0 auto;
      background:var(--bg);position:relative;
      transition:background .22s var(--ease);
    }

    /* ─── HEADER ─── */
    .hdr{
      flex-shrink:0;
      background:var(--surf);
      border-bottom:1px solid var(--b1);
      padding:14px 18px 0;
      transition:background .22s var(--ease),border-color .22s var(--ease);
      position:relative;z-index:20;
    }

    .hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

    .brand{display:flex;align-items:center}
    .brand-logo{
      height:38px;width:auto;max-width:200px;
      object-fit:contain;
      /* In dark mode show logo with a light background pill so it remains readable */
      border-radius:6px;
      transition:filter .22s var(--ease);
    }
    [data-theme="dark"] .brand-logo{
      background:#fff;
      padding:4px 8px;
      border-radius:6px;
    }

    .hdr-right{display:flex;align-items:center;gap:8px}

    .date-chip{
      font-size:11px;font-weight:500;color:var(--t2);
      background:var(--surf3);border:1px solid var(--b1);
      padding:4px 10px;border-radius:20px;white-space:nowrap;
      transition:background .22s var(--ease);
    }

    /* TOGGLE */
    .tog{
      width:52px;height:28px;border-radius:14px;
      background:var(--surf3);border:1px solid var(--b2);
      position:relative;cursor:pointer;transition:all .22s var(--ease);
      flex-shrink:0;
    }
    .tog-knob{
      position:absolute;top:3px;left:3px;
      width:20px;height:20px;border-radius:10px;
      background:var(--surf);box-shadow:0 1px 4px rgba(0,0,0,.18);
      display:flex;align-items:center;justify-content:center;font-size:11px;
      transition:transform .28s var(--spring),background .22s var(--ease);
    }
    [data-theme="light"] .tog-knob{transform:translateX(24px)}

    /* TABS */
    .tabs{display:flex}
    .tab{
      flex:1;padding:11px 4px;
      font-size:12.5px;font-weight:600;color:var(--t3);
      border-bottom:2.5px solid transparent;
      transition:all .2s var(--ease);
      display:flex;align-items:center;justify-content:center;gap:5px;
      white-space:nowrap;
    }
    .tab:hover{color:var(--t2)}
    .tab.on{color:var(--accent);border-bottom-color:var(--accent)}

    .badge{
      font-size:10px;font-weight:700;
      padding:1px 6px;border-radius:10px;
      background:var(--surf3);color:var(--t3);
      transition:all .2s var(--ease);min-width:20px;text-align:center;
    }
    .tab.on .badge{background:var(--accentD);color:var(--accent)}

    /* ─── CONTENT ─── */
    .content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .view{padding:18px 18px 90px;animation:su .22s var(--ease)}
    @keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ─── FORM ─── */
    .type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
    .tcard{
      border:1.5px solid var(--b1);border-radius:var(--radius);
      padding:14px;cursor:pointer;background:var(--surf);
      transition:all .2s var(--ease);position:relative;overflow:hidden;
    }
    .tcard:hover{border-color:var(--b2)}
    .tcard.sc{border-color:var(--green);background:var(--greenD)}
    .tcard.ss{border-color:var(--amber);background:var(--amberD)}

    .tcheck{
      position:absolute;top:10px;right:10px;
      width:18px;height:18px;border-radius:9px;
      border:1.5px solid var(--b2);font-size:10px;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s var(--ease);
    }
    .sc .tcheck{background:var(--green);border-color:var(--green);color:#fff}
    .ss .tcheck{background:var(--amber);border-color:var(--amber);color:#fff}

    .ticon{font-size:22px;margin-bottom:5px}
    .tlabel{font-size:13px;font-weight:700;color:var(--t1)}
    .thint{font-size:11px;color:var(--t3);margin-top:2px}

    /* FIELD GROUP */
    .fg{
      background:var(--surf);border:1px solid var(--b1);
      border-radius:var(--radius);overflow:hidden;margin-bottom:12px;
      transition:background .22s,border-color .2s var(--ease);
    }
    .fg-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);padding:10px 14px 0}
    .fi{padding:9px 14px;border-bottom:1px solid var(--b1);position:relative}
    .fi:last-child{border-bottom:none}
    .fi:focus-within{background:var(--surf2)}
    .fl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;display:block}
    .fi input,.fi textarea{
      width:100%;background:transparent;border:none;outline:none;
      color:var(--t1);font-size:14px;font-weight:400;padding:0;line-height:1.5;
      transition:color .2s;
    }
    .fi input::placeholder,.fi textarea::placeholder{color:var(--t4)}
    .fi textarea{resize:none;height:68px}
    .fg:focus-within{border-color:var(--b2)}

    /* SAVE */
    .save-btn{
      width:100%;padding:14px;border-radius:var(--radius);
      font-size:14px;font-weight:700;letter-spacing:.3px;
      transition:all .2s var(--ease);
      display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;
    }
    .save-btn:active{transform:scale(.98)}
    .sb-c{background:var(--green);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.28)}
    .sb-s{background:var(--amber);color:#fff;box-shadow:0 4px 16px rgba(245,158,11,.28)}
    .sb-c:hover,.sb-s:hover{filter:brightness(1.07)}

    /* ─── LIST ─── */
    .toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
    .swrap{flex:1;position:relative}
    .sicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
    .sinput{
      width:100%;background:var(--surf);border:1px solid var(--b1);
      border-radius:var(--radius-sm);color:var(--t1);font-size:13px;
      padding:9px 12px 9px 34px;outline:none;transition:all .2s var(--ease);
    }
    .sinput::placeholder{color:var(--t3)}
    .sinput:focus{border-color:var(--b2);background:var(--surf2)}

    .lmeta{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:10px;padding:0 2px}

    /* CARD */
    .rcard{
      background:var(--surf);border:1px solid var(--b1);
      border-radius:var(--radius);margin-bottom:10px;
      overflow:hidden;transition:all .2s var(--ease);
      cursor:pointer;animation:su .2s var(--ease);
    }
    .rcard:hover{border-color:var(--b2);box-shadow:var(--shadow);transform:translateY(-1px)}
    .rcard:active{transform:translateY(0)}

    .rstripe{height:3px}
    .customer .rstripe{background:linear-gradient(90deg,var(--green),transparent)}
    .service  .rstripe{background:linear-gradient(90deg,var(--amber),transparent)}

    .rbody{padding:13px 14px 11px}
    .rtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
    .rnames{flex:1;min-width:0}
    .rname{font-size:15px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
    .rmob{font-size:12px;color:var(--t2)}
    .rright{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:10px}

    .pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.3px;white-space:nowrap}
    .pc{background:var(--greenD);color:var(--green);border:1px solid var(--greenB)}
    .ps{background:var(--amberD);color:var(--amber);border:1px solid var(--amberB)}

    .raddr{font-size:12px;color:var(--t3);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rnotes{
      font-size:12px;color:var(--t2);
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
      line-height:1.5;padding:8px 10px;
      background:var(--surf3);border-radius:var(--radius-sm);border:1px solid var(--b1);margin-bottom:8px;
    }
    .rfoot{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .rdate{font-size:11px;color:var(--t3)}
    .racts{display:flex;gap:5px}

    .ibtn{
      width:30px;height:30px;border-radius:7px;
      border:1px solid var(--b1);background:var(--surf2);color:var(--t2);
      display:flex;align-items:center;justify-content:center;font-size:13px;
      transition:all .18s var(--ease);
    }
    .ibtn:hover{border-color:var(--b2);background:var(--surf3)}
    .ibtn.del:hover{background:var(--redD);border-color:rgba(239,68,68,.3);color:var(--red)}

    /* CARD SHARE BUTTON — full width at bottom of card */
    .card-share-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:11px 14px;
      border-top:1px solid var(--b1);
      background:var(--surf2);
      color:var(--t2);font-size:13px;font-weight:600;
      letter-spacing:.2px;
      transition:all .18s var(--ease);
    }
    .card-share-btn .csb-arrow{font-size:15px;transition:transform .18s var(--ease)}
    .card-share-btn:hover .csb-arrow{transform:translateY(-2px)}
    .customer .card-share-btn:hover{background:var(--greenD);color:var(--green)}
    .service  .card-share-btn:hover{background:var(--amberD);color:var(--amber)}

    /* SHARE POPUP */
    .sp-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.65);
      backdrop-filter:blur(10px);z-index:200;
      opacity:0;pointer-events:none;transition:opacity .25s var(--ease);
    }
    .sp-backdrop.on{opacity:1;pointer-events:all}

    .sp-panel{
      position:fixed;bottom:0;left:50%;
      transform:translateX(-50%) translateY(100%);
      width:100%;max-width:520px;
      background:var(--surf);
      border-top-left-radius:24px;border-top-right-radius:24px;
      border:1px solid var(--b2);border-bottom:none;
      z-index:205;transition:transform .32s cubic-bezier(.32,.72,0,1);
      padding-bottom:env(safe-area-inset-bottom,24px);
    }
    .sp-panel.on{transform:translateX(-50%) translateY(0)}

    .sp-drag{width:40px;height:4px;background:var(--b2);border-radius:2px;margin:14px auto 0}

    .sp-header{padding:20px 20px 10px;text-align:center}
    .sp-saved-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--greenD);border:1px solid var(--greenB);
      color:var(--green);font-size:11px;font-weight:700;
      padding:4px 12px;border-radius:20px;margin-bottom:10px;
      letter-spacing:.3px;text-transform:uppercase;
    }
    .sp-title{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:4px;line-height:1.2}
    .sp-sub{font-size:13px;color:var(--t3);line-height:1.4}

    .sp-preview{
      margin:12px 18px 16px;
      background:var(--surf2);border:1px solid var(--b1);border-radius:var(--radius);
      padding:12px 14px;font-size:12px;color:var(--t2);line-height:1.75;
      max-height:100px;overflow:hidden;position:relative;font-family:monospace;
      white-space:pre-wrap;
    }
    .sp-preview::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:32px;
      background:linear-gradient(to top,var(--surf2),transparent);border-radius:0 0 var(--radius) var(--radius);
    }

    /* 3-column share options */
    .sp-options{
      display:grid;grid-template-columns:1fr 1fr 1fr;
      gap:10px;padding:0 18px 12px;
    }

    .sp-opt{
      padding:16px 8px 12px;border-radius:var(--radius);border:1px solid var(--b1);
      background:var(--surf2);
      display:flex;flex-direction:column;align-items:center;gap:8px;
      font-size:12px;font-weight:600;color:var(--t2);
      transition:all .18s var(--ease);
    }
    .sp-opt:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--b2)}
    .sp-opt:active{transform:translateY(0)}
    .sp-opt .sp-ico{font-size:28px;line-height:1}
    .sp-opt .sp-lbl{font-size:11.5px}

    .sp-opt.wa{border-color:rgba(37,211,102,.2)}
    .sp-opt.wa:hover{background:rgba(37,211,102,.1);color:#25d366;border-color:rgba(37,211,102,.45)}
    .sp-opt.em{border-color:var(--accentB)}
    .sp-opt.em:hover{background:var(--accentD);color:var(--accent);border-color:var(--accent)}
    .sp-opt.cp:hover{background:var(--surf3)}

    /* Divider */
    .sp-divider{height:1px;background:var(--b1);margin:0 18px 12px}

    .sp-skip{
      display:block;width:calc(100% - 36px);margin:0 18px;
      padding:12px;border-radius:var(--radius-sm);border:1px solid var(--b1);
      background:transparent;color:var(--t3);font-size:13px;font-weight:500;
      transition:all .18s var(--ease);text-align:center;
    }
    .sp-skip:hover{color:var(--t2);border-color:var(--b2);background:var(--surf2)}

    /* EMPTY */
    .empty{text-align:center;padding:52px 20px}
    .eico{width:68px;height:68px;border-radius:22px;background:var(--surf);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px}
    .etitle{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:6px}
    .esub{font-size:13px;color:var(--t3);line-height:1.5}

    /* ─── BOTTOM SHEET ─── */
    .backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.52);
      backdrop-filter:blur(6px);z-index:90;
      opacity:0;pointer-events:none;transition:opacity .26s var(--ease);
    }
    .backdrop.on{opacity:1;pointer-events:all}

    .sheet{
      position:fixed;bottom:0;left:50%;
      transform:translateX(-50%) translateY(100%);
      width:100%;max-width:520px;
      background:var(--surf);
      border-top-left-radius:22px;border-top-right-radius:22px;
      border:1px solid var(--b2);border-bottom:none;
      z-index:95;transition:transform .3s cubic-bezier(.32,.72,0,1);
      max-height:92dvh;overflow-y:auto;
      padding-bottom:env(safe-area-inset-bottom,20px);
    }
    .sheet.on{transform:translateX(-50%) translateY(0)}

    .sdrag{width:40px;height:4px;background:var(--b2);border-radius:2px;margin:12px auto 0}
    .shdr{
      padding:16px 18px 14px;
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
    }
    .stype-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
    .sdot{width:8px;height:8px;border-radius:50%}
    .slabel{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3)}
    .sname{font-family:var(--font-serif);font-size:26px;color:var(--t1);line-height:1.2}
    .sclose{
      width:32px;height:32px;border-radius:8px;border:1px solid var(--b1);
      background:var(--surf2);color:var(--t2);
      display:flex;align-items:center;justify-content:center;font-size:14px;
      flex-shrink:0;transition:all .18s var(--ease);
    }
    .sclose:hover{border-color:var(--b2)}
    .sdivider{height:1px;background:var(--b1);margin:0 18px}
    .sbody{padding:16px 18px}

    .dgrid{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
    .dkey{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:4px}
    .dval{font-size:14px;color:var(--t1);line-height:1.6}
    .dnotes{
      background:var(--surf2);border:1px solid var(--b1);
      border-radius:var(--radius-sm);padding:12px;
      font-size:13px;color:var(--t2);line-height:1.7;
    }

    /* SHARE */
    .share-box{
      background:var(--surf2);border:1px solid var(--b1);
      border-radius:var(--radius);padding:14px;margin-bottom:14px;
    }
    .share-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:10px}
    .share-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

    .sbtn{
      padding:11px 6px;border-radius:var(--radius-sm);border:1px solid var(--b1);
      background:var(--surf);font-size:11.5px;font-weight:600;color:var(--t2);
      display:flex;flex-direction:column;align-items:center;gap:5px;
      transition:all .18s var(--ease);
    }
    .sbtn:hover{border-color:var(--b2);transform:translateY(-1px);box-shadow:var(--shadow)}
    .sbtn:active{transform:translateY(0)}
    .sbtn .si{font-size:20px}

    .sbtn.wa:hover{background:rgba(37,211,102,.08);color:#25d366;border-color:rgba(37,211,102,.4)}
    .sbtn.em:hover{background:var(--accentD);color:var(--accent);border-color:var(--accentB)}

    .del-btn{
      width:100%;padding:12px;border-radius:var(--radius-sm);
      border:1px solid rgba(239,68,68,.2);background:var(--redD);color:var(--red);
      font-size:13px;font-weight:600;
      display:flex;align-items:center;justify-content:center;gap:6px;
      transition:all .18s var(--ease);
    }
    .del-btn:hover{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.36)}

    /* TOAST */
    .toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(14px);
      background:var(--t1);color:var(--bg);
      padding:10px 20px;border-radius:30px;
      font-size:13px;font-weight:600;z-index:200;
      opacity:0;pointer-events:none;
      transition:all .28s var(--spring);
      white-space:nowrap;box-shadow:var(--shadowLg);max-width:90vw;
    }
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    .fade-mask{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:520px;height:56px;
      background:linear-gradient(to top,var(--bg) 40%,transparent);
      pointer-events:none;z-index:5;transition:background .22s var(--ease);
    }

    @keyframes shake{
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-6px)}
      75%{transform:translateX(5px)}
    }
  </style>

<script>
/* ── STATE ── */
let records = JSON.parse(localStorage.getItem('fn2_records') || '[]');
let curType = 'customer';

/* ── INIT ── */
(function(){
  const d = new Date(), mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateBadge').textContent = `${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}`;

  const th = localStorage.getItem('fn2_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', th);
  document.getElementById('togKnob').textContent = th === 'dark' ? '🌙' : '☀️';

  updateCounts();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();

/* ── THEME ── */
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const nxt = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', nxt);
  document.getElementById('togKnob').textContent = nxt === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('fn2_theme', nxt);
}

/* ── TABS ── */
function goTab(tab) {
  ['add','customers','service'].forEach(t => {
    document.getElementById('v-'+t).style.display = 'none';
    document.getElementById('t-'+t).classList.remove('on');
  });
  document.getElementById('v-'+tab).style.display = 'block';
  document.getElementById('t-'+tab).classList.add('on');
  if (tab === 'customers') renderList('customer');
  if (tab === 'service')   renderList('service');
}

/* ── TYPE SELECT ── */
function selType(type) {
  curType = type;
  document.getElementById('tc-customer').className = 'tcard' + (type==='customer' ? ' sc' : '');
  document.getElementById('tc-service').className  = 'tcard' + (type==='service'  ? ' ss' : '');
  document.getElementById('ck-customer').textContent = type === 'customer' ? '✓' : '';
  document.getElementById('ck-service').textContent  = type === 'service'  ? '✓' : '';
  const btn = document.getElementById('savebtn');
  btn.className = 'save-btn ' + (type === 'customer' ? 'sb-c' : 'sb-s');
  document.getElementById('save-lbl').textContent = type === 'customer' ? 'Save Customer' : 'Save Service Call';
}

/* ── SAVE ── */
function saveEntry() {
  const name    = g('fn');
  const mobile  = g('fm');
  const address = g('fa');
  const notes   = g('fno');

  if (!name)   { sk('fn');  tip('⚠ Name is required');   return; }
  if (!mobile) { sk('fm');  tip('⚠ Mobile is required');  return; }

  const entry = { id: uid(), type: curType, name, mobile, address, notes, createdAt: new Date().toISOString() };
  records.unshift(entry);
  save();           // persist immediately
  updateCounts();
  ['fn','fm','fa','fno'].forEach(id => document.getElementById(id).value = '');

  // Pop up share sheet right after save
  openSharePopup(entry.id, true);
}

/* ── LIST ── */
const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderList(type, q = '') {
  const lid = type === 'customer' ? 'l-customers' : 'l-service';
  const mid = type === 'customer' ? 'lm-c' : 'lm-s';

  let items = records.filter(r => r.type === type);
  if (q) {
    const lq = q.toLowerCase();
    items = items.filter(r =>
      r.name.toLowerCase().includes(lq) ||
      r.mobile.includes(lq) ||
      (r.address||'').toLowerCase().includes(lq) ||
      (r.notes||'').toLowerCase().includes(lq)
    );
  }

  document.getElementById(mid).textContent =
    `${items.length} ${items.length === 1 ? 'record' : 'records'}${q ? ' found' : ''}`;

  const el = document.getElementById(lid);
  if (!items.length) {
    el.innerHTML = `<div class="empty">
      <div class="eico">${type==='customer'?'👤':'🔧'}</div>
      <div class="etitle">${q?'No results found':'No entries yet'}</div>
      <div class="esub">${q?'Try different keywords':'Add entries from the New Entry tab'}</div>
    </div>`; return;
  }

  el.innerHTML = items.map(r => {
    const dt = new Date(r.createdAt);
    const ds = `${dt.getDate()} ${MO[dt.getMonth()]} · ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
    return `<div class="rcard ${r.type}" onclick="openSheet('${r.id}')">
      <div class="rstripe"></div>
      <div class="rbody">
        <div class="rtop">
          <div class="rnames">
            <div class="rname">${x(r.name)}</div>
            <div class="rmob">📱 ${x(r.mobile)}</div>
          </div>
          <div class="rright">
            <span class="pill ${r.type==='customer'?'pc':'ps'}">${r.type==='customer'?'CUSTOMER':'SERVICE'}</span>
          </div>
        </div>
        ${r.address ? `<div class="raddr">📍 ${x(r.address.split('\n')[0])}</div>` : ''}
        ${r.notes   ? `<div class="rnotes">${x(r.notes)}</div>` : ''}
        <div class="rfoot">
          <div class="rdate">🕐 ${ds}</div>
          <button class="ibtn del" onclick="event.stopPropagation();delRecord('${r.id}','${r.type}')" title="Delete">🗑</button>
        </div>
      </div>
      <button class="card-share-btn" onclick="event.stopPropagation();openSharePopup('${r.id}')">
        <span class="csb-arrow">↑</span> Share Entry
      </button>
    </div>`;
  }).join('');
}

function filterList(q, type) { renderList(type, q); }

/* ── SHEET ── */
function openSheet(id) {
  const r = records.find(a => a.id === id);
  if (!r) return;

  const dt = new Date(r.createdAt);
  const ds = `${dt.getDate()} ${MO[dt.getMonth()]} ${dt.getFullYear()}, ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;

  document.getElementById('sdot').style.background   = r.type==='customer' ? 'var(--green)' : 'var(--amber)';
  document.getElementById('slabel').textContent       = r.type==='customer' ? 'New Customer' : 'Service Call';
  document.getElementById('sname').textContent        = r.name;

  document.getElementById('sbody').innerHTML = `
    <div class="dgrid">
      <div>
        <div class="dkey">📱 Mobile</div>
        <div class="dval">${x(r.mobile)}</div>
      </div>
      ${r.address ? `<div>
        <div class="dkey">📍 Address</div>
        <div class="dval">${x(r.address).replace(/\n/g,'<br>')}</div>
      </div>` : ''}
      ${r.notes ? `<div>
        <div class="dkey">📝 Notes</div>
        <div class="dnotes">${x(r.notes).replace(/\n/g,'<br>')}</div>
      </div>` : ''}
      <div>
        <div class="dkey">🕐 Recorded</div>
        <div class="dval" style="font-size:13px;color:var(--t2)">${ds}</div>
      </div>
    </div>

    <div class="share-box">
      <div class="share-title">Share Entry</div>
      <div class="share-grid">
        <button class="sbtn wa" onclick="openSharePopup('${r.id}')">
          <span class="si">↑</span>Share
        </button>
      </div>
    </div>

    <button class="del-btn" onclick="delRecord('${r.id}','${r.type}',true)">
      🗑 Delete Entry
    </button>
  `;

  document.getElementById('backdrop').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}

function closeSheet() {
  document.getElementById('backdrop').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
}

/* ── SHARE POPUP ── */
let _spId = null;

function openSharePopup(id, afterSave = false) {
  _spId = id;
  const r = records.find(a => a.id === id);
  if (!r) return;

  const label = r.type === 'customer' ? 'New Customer' : 'Service Call';
  const badge = document.getElementById('sp-badge');

  if (afterSave) {
    badge.style.display = 'inline-flex';
    badge.textContent = `✓ ${label} Saved`;
    document.getElementById('sp-title').textContent = `Share with your team?`;
    document.getElementById('sp-sub').textContent = `${r.name}'s details are ready to share`;
    document.getElementById('sp-skip').textContent = `Skip — don't share now`;
  } else {
    badge.style.display = 'none';
    document.getElementById('sp-title').textContent = `Share Entry`;
    document.getElementById('sp-sub').textContent = `Share ${r.name}'s details`;
    document.getElementById('sp-skip').textContent = `Cancel`;
  }

  // Preview (clean text)
  const prev = fmtEntry(id).replace(/\*/g,'').replace(/_/g,'');
  document.getElementById('sp-preview').textContent = prev;

  // Wire share buttons — after any share, also persist (already saved but ensure)
  document.getElementById('sp-wa').onclick = () => { shareWA(id); save(); closeSharePopup(); if(afterSave) tip('✓ Saved & shared via WhatsApp'); };
  document.getElementById('sp-em').onclick = () => { shareMail(id); save(); closeSharePopup(); if(afterSave) tip('✓ Saved & shared via Email'); };
  document.getElementById('sp-cp').onclick = () => {
    copyEntry(id);
    save();
    closeSharePopup();
    // tip shown inside copyEntry
  };
  document.getElementById('sp-skip').onclick = () => {
    if (afterSave) tip(r.type==='customer' ? '✓ Customer saved!' : '✓ Service call saved!');
    closeSharePopup();
  };

  document.getElementById('sp-backdrop').classList.add('on');
  document.getElementById('sp-panel').classList.add('on');
}

function closeSharePopup() {
  document.getElementById('sp-backdrop').classList.remove('on');
  document.getElementById('sp-panel').classList.remove('on');
  _spId = null;
}

/* ── SHARE / FORMAT ── */
function fmtEntry(id) {
  const r = records.find(a => a.id === id);
  if (!r) return '';
  const dt = new Date(r.createdAt);
  const ds = `${dt.getDate()} ${MO[dt.getMonth()]} ${dt.getFullYear()}, ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  const hdr = r.type === 'customer' ? '🆕 NEW CUSTOMER' : '🔧 SERVICE CALL';
  const sep = '━'.repeat(26);
  let m = `*${hdr}*\n${sep}\n`;
  m += `👤 *Name*     : ${r.name}\n`;
  m += `📱 *Mobile*   : ${r.mobile}\n`;
  if (r.address) m += `📍 *Address*  : ${r.address.replace(/\n/g,', ')}\n`;
  if (r.notes)   m += `📝 *Notes*    :\n${r.notes}\n`;
  m += `${sep}\n`;
  m += `🕐 *Recorded* : ${ds}\n`;
  m += `\n_Sent via Rajdeep Furnitures Field App_`;
  return m;
}

function shareWA(id)   { window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(fmtEntry(id)),'_blank'); }
function shareMail(id) {
  const r = records.find(a => a.id === id);
  if (!r) return;
  const subj = `Rajdeep Furnitures – ${r.type==='customer'?'New Customer':'Service Call'}: ${r.name}`;
  window.open(`mailto:?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(fmtEntry(id))}`, '_blank');
}
function copyEntry(id) {
  const msg = fmtEntry(id);
  navigator.clipboard.writeText(msg)
    .then(()=> tip('📋 Copied! Paste anywhere to share.'))
    .catch(()=> { fallbackCopy(msg); tip('📋 Copied to clipboard!'); });
}
function fallbackCopy(text) {
  const e = document.createElement('textarea');
  e.value = text; document.body.appendChild(e); e.select();
  document.execCommand('copy'); document.body.removeChild(e);
}

/* ── DELETE ── */
function delRecord(id, type, fromSheet) {
  records = records.filter(r => r.id !== id);
  save(); updateCounts();
  if (fromSheet) closeSheet();
  renderList(type);
  tip('Entry deleted');
}

/* ── UTILS ── */
function save()  { localStorage.setItem('fn2_records', JSON.stringify(records)); }
function updateCounts() {
  document.getElementById('bc').textContent = records.filter(r=>r.type==='customer').length;
  document.getElementById('bs').textContent = records.filter(r=>r.type==='service').length;
}
function g(id)  { return document.getElementById(id).value.trim(); }
function x(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid()  { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function sk(id) {
  const el = document.getElementById(id);
  el.style.animation='none'; el.offsetHeight;
  el.style.animation='shake .35s ease';
  setTimeout(()=>el.style.animation='',400);
}
function tip(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('on'),2400);
}
</script>
