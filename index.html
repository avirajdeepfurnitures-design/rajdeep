<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0A0A12"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rajdeep"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.jpg"/>
<title>Rajdeep Furnitures</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900;1000&display=swap" rel="stylesheet"/>
<style>
:root {
  --ease: cubic-bezier(0.2,0,0,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --font: 'Nunito', sans-serif;
  --r-sm: 16px; --r-md: 20px; --r-lg: 28px; --r-xl: 36px; --r-pill: 100px;

  /* PUNCHY PALETTE */
  --blue:       #2979FF;
  --blue-light: #82B1FF;
  --blue-glow:  rgba(41,121,255,0.35);
  --blue-tint:  rgba(41,121,255,0.12);

  --red:        #FF3D3D;
  --red-light:  #FF8A80;
  --red-glow:   rgba(255,61,61,0.35);
  --red-tint:   rgba(255,61,61,0.12);

  --green:      #00E676;
  --green-tint: rgba(0,230,118,0.15);

  --orange:     #FF6D00;
  --purple:     #AA00FF;
  --yellow:     #FFD600;
}

/* ─── DARK THEME ─── */
[data-theme="dark"] {
  --bg:        #0A0A12;
  --bg2:       #0F0F1C;
  --card:      #14142A;  
  --card2:     #1A1A32;
  --card3:     #20203C;
  --stroke:    rgba(255,255,255,0.07);
  --stroke2:   rgba(255,255,255,0.13);
  --t1:        #FFFFFF;
  --t2:        #B0B0D0;
  --t3:        #6060A0;
  --t4:        #30306A;
  --scrim:     rgba(0,0,10,0.80);

  --cust:      var(--blue);
  --cust-light:var(--blue-light);
  --cust-glow: var(--blue-glow);
  --cust-tint: var(--blue-tint);
  --cust-text: #FFFFFF;

  --svc:       var(--red);
  --svc-light: var(--red-light);
  --svc-glow:  var(--red-glow);
  --svc-tint:  var(--red-tint);
  --svc-text:  #FFFFFF;

  --del:       #FF3D3D;
  --del-tint:  rgba(255,61,61,0.12);

  --sh1: 0 2px 8px rgba(0,0,0,0.6);
  --sh2: 0 6px 24px rgba(0,0,0,0.7);
  --sh3: 0 12px 40px rgba(0,0,0,0.8);
}

/* ─── LIGHT THEME ─── */
[data-theme="light"] {
  --bg:        #F0F2FF;
  --bg2:       #E8EAFF;
  --card:      #FFFFFF;
  --card2:     #F5F6FF;
  --card3:     #ECEEFF;
  --stroke:    rgba(0,0,60,0.07);
  --stroke2:   rgba(0,0,60,0.13);
  --t1:        #0A0A24;
  --t2:        #3A3A5C;
  --t3:        #8080AA;
  --t4:        #C0C0DD;
  --scrim:     rgba(0,0,40,0.60);

  --cust:      #1565C0;
  --cust-light:#42A5F5;
  --cust-glow: rgba(21,101,192,0.25);
  --cust-tint: rgba(21,101,192,0.09);
  --cust-text: #FFFFFF;

  --svc:       #C62828;
  --svc-light: #EF5350;
  --svc-glow:  rgba(198,40,40,0.25);
  --svc-tint:  rgba(198,40,40,0.09);
  --svc-text:  #FFFFFF;

  --del:       #C62828;
  --del-tint:  rgba(198,40,40,0.09);

  --sh1: 0 2px 8px rgba(0,0,60,0.08);
  --sh2: 0 6px 24px rgba(0,0,60,0.10);
  --sh3: 0 12px 40px rgba(0,0,60,0.14);
}

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font);background:var(--bg);color:var(--t1);
  height:100dvh;overflow:hidden;
  transition:background .35s var(--ease),color .35s var(--ease);
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:0;height:0}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:inherit}

/* ─── APP SHELL ─── */
#app{
  display:flex;flex-direction:column;height:100dvh;
  max-width:520px;margin:0 auto;position:relative;overflow:hidden;
}

/* ══════════════════════════════════════
   TOP BAR
══════════════════════════════════════ */
.topbar{
  flex-shrink:0;
  background:var(--card);
  padding:14px 18px 0;
  position:relative;z-index:30;
  border-bottom:1px solid var(--stroke);
  transition:background .35s var(--ease);
}

.topbar-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;min-height:50px;
}

.brand-logo{
  height:42px;width:auto;max-width:200px;
  object-fit:contain;border-radius:8px;display:block;
}
[data-theme="dark"] .brand-logo{background:#fff;padding:4px 8px;border-radius:8px}

/* Theme toggle */
.tog{
  width:64px;height:36px;border-radius:var(--r-pill);
  background:var(--card3);border:2px solid var(--stroke2);
  position:relative;cursor:pointer;flex-shrink:0;
  transition:all .3s var(--ease);
}
.tog-knob{
  position:absolute;top:3px;left:3px;
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  box-shadow:var(--sh1);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;
  transition:transform .3s var(--spring),background .3s var(--ease);
}
[data-theme="light"] .tog-knob{
  transform:translateX(28px);
  background:linear-gradient(135deg,#334,#223);
}

/* ─── NAV PILLS ─── */
.navrow{display:flex;gap:8px;padding-bottom:14px;overflow-x:auto}
.navrow::-webkit-scrollbar{display:none}

.np{
  display:flex;align-items:center;gap:8px;
  padding:11px 20px;border-radius:var(--r-pill);
  font-size:14px;font-weight:800;white-space:nowrap;
  cursor:pointer;
  background:var(--card2);
  border:2px solid var(--stroke);
  color:var(--t3);
  transition:all .25s var(--ease);
}
.np:active{transform:scale(.96)}

.np.on-add{
  background:var(--card3);color:var(--t1);
  border-color:var(--stroke2);
  box-shadow:var(--sh1);
}
.np.on-cust{
  background:var(--cust);color:var(--cust-text);
  border-color:transparent;
  box-shadow:0 4px 20px var(--cust-glow);
}
.np.on-svc{
  background:var(--svc);color:var(--svc-text);
  border-color:transparent;
  box-shadow:0 4px 20px var(--svc-glow);
}

.nbadge{
  font-size:12px;font-weight:900;
  padding:2px 8px;border-radius:var(--r-pill);
  background:rgba(255,255,255,0.2);
  color:inherit;min-width:24px;text-align:center;
  transition:all .25s var(--ease);
}
.np:not(.on-cust):not(.on-svc) .nbadge{background:var(--stroke2);color:var(--t3)}

/* ══════════════════════════════════════
   CONTENT
══════════════════════════════════════ */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.view{padding:20px 16px 110px;animation:fadeup .28s var(--ease)}
@keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════
   TYPE SELECTOR — BIG CARDS
══════════════════════════════════════ */
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}

.tcard{
  border-radius:var(--r-lg);padding:22px 18px 20px;
  border:2px solid var(--stroke);
  background:var(--card);
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .25s var(--ease);
}
.tcard:active{transform:scale(.97)}

.tcard.sc{
  border-color:var(--cust);
  background:linear-gradient(145deg,var(--card) 50%,var(--cust-tint));
  box-shadow:0 0 0 0 var(--cust-glow);
}
.tcard.ss{
  border-color:var(--svc);
  background:linear-gradient(145deg,var(--card) 50%,var(--svc-tint));
  box-shadow:0 0 0 0 var(--svc-glow);
}

/* glowing corner accent */
.tcard.sc::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:80px;height:80px;border-radius:50%;
  background:var(--cust);opacity:0.15;filter:blur(20px);
}
.tcard.ss::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:80px;height:80px;border-radius:50%;
  background:var(--svc);opacity:0.15;filter:blur(20px);
}

.tc-check{
  position:absolute;top:14px;right:14px;
  width:26px;height:26px;border-radius:50%;
  border:2px solid var(--stroke2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;
  transition:all .25s var(--ease);z-index:1;
}
.sc .tc-check{background:var(--cust);border-color:var(--cust);color:#fff;box-shadow:0 2px 10px var(--cust-glow)}
.ss .tc-check{background:var(--svc);border-color:var(--svc);color:#fff;box-shadow:0 2px 10px var(--svc-glow)}

.tc-icon{font-size:40px;margin-bottom:10px;display:block;position:relative;z-index:1}
.tc-label{font-size:16px;font-weight:900;color:var(--t1);margin-bottom:3px;position:relative;z-index:1}
.tc-hint{font-size:12px;color:var(--t3);font-weight:600;position:relative;z-index:1}

/* ══════════════════════════════════════
   INPUT FIELD CARDS
══════════════════════════════════════ */
.fcard{
  background:var(--card);
  border-radius:var(--r-lg);
  border:2px solid var(--stroke);
  overflow:hidden;margin-bottom:14px;
  transition:border-color .2s var(--ease),background .35s var(--ease);
}
.fcard:focus-within{border-color:var(--stroke2)}

.fcard-head{
  padding:14px 18px 6px;
  font-size:11px;font-weight:900;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);
}

.frow{
  padding:12px 18px;border-top:1px solid var(--stroke);
  transition:background .18s var(--ease);
}
.frow:first-of-type{border-top:none}
.frow:focus-within{background:var(--card2)}

.flabel{
  display:block;font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:5px;
}
.frow input,.frow textarea{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--t1);font-size:17px;font-weight:600;line-height:1.5;padding:0;
}
.frow input::placeholder,.frow textarea::placeholder{color:var(--t4);font-weight:500}
.frow textarea{resize:none;height:80px}

/* ══════════════════════════════════════
   SAVE BUTTON — HUGE & GLOWING
══════════════════════════════════════ */
.save-btn{
  width:100%;padding:20px;border-radius:var(--r-xl);
  font-size:18px;font-weight:900;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:8px;transition:all .25s var(--ease);color:#fff;
  position:relative;overflow:hidden;
}
.save-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
}
.save-btn:active{transform:scale(.97)}

.sb-c{background:linear-gradient(135deg,#2979FF,#1565C0);box-shadow:0 6px 28px var(--blue-glow)}
.sb-s{background:linear-gradient(135deg,#FF3D3D,#C62828);box-shadow:0 6px 28px var(--red-glow)}

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
.search-wrap{position:relative;margin-bottom:18px}
.search-ico{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--t3);pointer-events:none;
}
.search-input{
  width:100%;background:var(--card);border:2px solid var(--stroke);
  border-radius:var(--r-pill);color:var(--t1);
  font-size:15px;font-weight:600;
  padding:14px 18px 14px 48px;outline:none;
  transition:all .2s var(--ease);
}
.search-input::placeholder{color:var(--t3)}
.search-input:focus{border-color:var(--stroke2);background:var(--card2)}

.list-meta{font-size:13px;font-weight:700;color:var(--t3);margin-bottom:14px;padding:0 4px}

/* ══════════════════════════════════════
   RECORD CARD
══════════════════════════════════════ */
.rcard{
  background:var(--card);border-radius:var(--r-lg);
  border:2px solid var(--stroke);margin-bottom:14px;
  overflow:hidden;transition:all .22s var(--ease);
  cursor:pointer;animation:fadeup .22s var(--ease);
  position:relative;
}
.rcard:hover{border-color:var(--stroke2);box-shadow:var(--sh2);transform:translateY(-2px)}
.rcard:active{transform:scale(.99)}

/* left side colored glow bar */
.rcard.customer::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--cust),transparent);
  border-radius:4px 0 0 4px;
}
.rcard.service::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--svc),transparent);
  border-radius:4px 0 0 4px;
}

.rbody{padding:18px 18px 14px 22px}

.rtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}

.rname{
  font-size:20px;font-weight:900;color:var(--t1);
  line-height:1.2;margin-bottom:4px;
}
.rmob{font-size:14px;font-weight:600;color:var(--t2)}

.rright{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:12px}

/* Type chip — punchy pill */
.type-chip{
  font-size:11px;font-weight:900;padding:6px 14px;
  border-radius:var(--r-pill);letter-spacing:.5px;white-space:nowrap;
}
.chip-cust{background:var(--cust);color:#fff;box-shadow:0 2px 12px var(--cust-glow)}
.chip-svc {background:var(--svc); color:#fff;box-shadow:0 2px 12px var(--svc-glow)}
[data-theme="light"] .chip-cust{background:var(--cust);color:#fff}
[data-theme="light"] .chip-svc {background:var(--svc); color:#fff}

.del-ico{
  width:38px;height:38px;border-radius:50%;
  background:var(--del-tint);color:var(--del);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .18s var(--ease);
  border:2px solid transparent;
}
.del-ico:hover{background:var(--del);color:#fff;border-color:var(--del)}

.raddr{
  font-size:13px;font-weight:600;color:var(--t3);
  margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.rnotes{
  background:var(--card2);border-radius:var(--r-md);
  padding:12px 14px;
  font-size:14px;font-weight:500;color:var(--t2);
  line-height:1.55;margin-bottom:12px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  border:1px solid var(--stroke);
}

.rfoot{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.rdate{font-size:12px;font-weight:700;color:var(--t3)}

/* SHARE button — full width, big, colored */
.card-share{
  width:100%;padding:16px;
  border-top:2px solid var(--stroke);
  font-size:15px;font-weight:900;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s var(--ease);
  border-radius:0 0 calc(var(--r-lg) - 2px) calc(var(--r-lg) - 2px);
}
.customer .card-share{
  color:var(--cust);background:var(--cust-tint);
}
.customer .card-share:hover{background:var(--cust);color:#fff;box-shadow:inset 0 0 0 0 transparent}
.service  .card-share{color:var(--svc);background:var(--svc-tint)}
.service  .card-share:hover{background:var(--svc);color:#fff}

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty{text-align:center;padding:60px 24px}
.empty-ico{
  width:90px;height:90px;border-radius:var(--r-xl);
  background:var(--card2);border:2px solid var(--stroke);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;margin:0 auto 20px;
}
.empty-title{font-size:20px;font-weight:900;color:var(--t1);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--t3);line-height:1.6;font-weight:600}

/* ══════════════════════════════════════
   BOTTOM SHEET — DETAIL
══════════════════════════════════════ */
.backdrop{
  position:fixed;inset:0;background:var(--scrim);backdrop-filter:blur(10px);
  z-index:90;opacity:0;pointer-events:none;transition:opacity .28s var(--ease);
}
.backdrop.on{opacity:1;pointer-events:all}

.sheet{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%;max-width:520px;background:var(--card);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  border:2px solid var(--stroke2);border-bottom:none;
  z-index:95;transition:transform .32s cubic-bezier(.32,.72,0,1);
  max-height:92dvh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom,24px);
}
.sheet.on{transform:translateX(-50%) translateY(0)}

.sheet-drag{width:40px;height:5px;background:var(--stroke2);border-radius:3px;margin:14px auto 0}

.sheet-hdr{padding:18px 22px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.sheet-type-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sheet-dot{width:10px;height:10px;border-radius:50%}
.sheet-lbl{font-size:11px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3)}
.sheet-name{font-size:30px;font-weight:900;color:var(--t1);line-height:1.15}

.sheet-close{
  width:42px;height:42px;border-radius:50%;
  background:var(--card2);border:2px solid var(--stroke);
  color:var(--t2);display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all .18s var(--ease);
}
.sheet-close:hover{background:var(--card3)}

.sheet-div{height:1px;background:var(--stroke);margin:0 22px}
.sheet-body{padding:20px 22px}

.detail-grid{display:flex;flex-direction:column;gap:18px;margin-bottom:22px}
.dkey{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:5px}
.dval{font-size:16px;font-weight:600;color:var(--t1);line-height:1.6}
.dnotes{
  background:var(--card2);border-radius:var(--r-md);
  padding:14px 16px;font-size:15px;color:var(--t2);line-height:1.7;
  font-weight:500;border:1px solid var(--stroke);
}

.sheet-share-btn{
  width:100%;padding:19px;border-radius:var(--r-xl);
  font-size:16px;font-weight:900;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  color:#fff;margin-bottom:12px;
  transition:all .22s var(--ease);position:relative;overflow:hidden;
}
.sheet-share-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
}
.sheet-share-btn:active{transform:scale(.97)}
.customer-sheet .sheet-share-btn{background:linear-gradient(135deg,#2979FF,#1565C0);box-shadow:0 6px 24px var(--blue-glow)}
.service-sheet  .sheet-share-btn{background:linear-gradient(135deg,#FF3D3D,#C62828);box-shadow:0 6px 24px var(--red-glow)}

.sheet-del-btn{
  width:100%;padding:16px;border-radius:var(--r-xl);
  background:var(--del-tint);color:var(--del);
  font-size:15px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:2px solid rgba(255,61,61,0.2);transition:all .18s var(--ease);
}
.sheet-del-btn:hover{background:var(--del);color:#fff;box-shadow:0 4px 20px var(--red-glow)}

/* ══════════════════════════════════════
   SHARE POPUP
══════════════════════════════════════ */
.sp-back{
  position:fixed;inset:0;background:var(--scrim);backdrop-filter:blur(12px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .26s var(--ease);
}
.sp-back.on{opacity:1;pointer-events:all}

.sp-sheet{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%;max-width:520px;
  background:var(--card);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  border:2px solid var(--stroke2);border-bottom:none;
  z-index:205;transition:transform .32s cubic-bezier(.32,.72,0,1);
  padding-bottom:env(safe-area-inset-bottom,24px);
}
.sp-sheet.on{transform:translateX(-50%) translateY(0)}

.sp-drag{width:40px;height:5px;background:var(--stroke2);border-radius:3px;margin:14px auto 0}
.sp-inner{padding:18px 20px}

.sp-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:var(--r-pill);
  background:linear-gradient(135deg,var(--green),#00BFA5);
  color:#003322;font-size:12px;font-weight:900;
  margin-bottom:12px;letter-spacing:.5px;
  box-shadow:0 4px 16px var(--green-tint);
}
.sp-title{font-size:22px;font-weight:900;color:var(--t1);margin-bottom:6px;line-height:1.2}
.sp-sub{font-size:14px;font-weight:600;color:var(--t3);margin-bottom:18px}

.sp-preview{
  background:var(--card2);border:2px solid var(--stroke);
  border-radius:var(--r-md);padding:14px 16px;
  font-size:13px;font-weight:500;color:var(--t3);line-height:1.7;
  max-height:100px;overflow:hidden;position:relative;margin-bottom:20px;
}
.sp-preview::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:32px;
  background:linear-gradient(to top,var(--card2),transparent);
}

/* 3 share option tiles */
.sp-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}

.sp-opt{
  padding:20px 8px 18px;border-radius:var(--r-lg);
  border:2px solid var(--stroke);background:var(--card2);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  font-size:13px;font-weight:800;color:var(--t2);
  transition:all .2s var(--ease);
}
.sp-opt:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.sp-opt:active{transform:scale(.96)}
.sp-ico{font-size:34px;line-height:1}

.sp-opt.wa{
  background:linear-gradient(145deg,#E8F8EE,#C8F0D8);
  border-color:rgba(0,200,83,.3);color:#1B5E20;
}
[data-theme="dark"] .sp-opt.wa{
  background:rgba(0,200,83,.12);
  border-color:rgba(0,200,83,.3);color:#69F0AE;
}
.sp-opt.em{
  background:linear-gradient(145deg,var(--cust-tint),transparent);
  border-color:rgba(41,121,255,.3);color:var(--cust);
}
.sp-opt.cp{background:var(--card2)}

.sp-skip{
  width:100%;padding:17px;border-radius:var(--r-xl);
  background:var(--card2);color:var(--t2);
  font-size:15px;font-weight:800;
  border:2px solid var(--stroke);
  transition:all .18s var(--ease);
}
.sp-skip:hover{background:var(--card3);border-color:var(--stroke2)}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--t1);color:var(--bg);
  padding:14px 28px;border-radius:var(--r-pill);
  font-size:14px;font-weight:800;z-index:300;
  opacity:0;pointer-events:none;
  transition:all .3s var(--spring);
  white-space:nowrap;box-shadow:var(--sh3);max-width:90vw;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.fade-edge{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;height:64px;
  background:linear-gradient(to top,var(--bg) 40%,transparent);
  pointer-events:none;z-index:5;
  transition:background .35s var(--ease);
}

@keyframes shake{
  0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(6px)}
}
</style>
</head>

      </div>
      <div class="tcard" id="tc-s" onclick="selType('service')">

        <textarea id="fa" placeholder="House / flat, street, area, city…"></textarea>

<script>
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let records=JSON.parse(localStorage.getItem('rfn_records')||'[]');
let curType='customer';

(function(){
  const th=localStorage.getItem('rfn_theme')||'dark';
  document.documentElement.setAttribute('data-theme',th);
  document.getElementById('themeKnob').textContent=th==='dark'?'🌙':'☀️';
  updateCounts();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();

function toggleTheme(){
  const nxt=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',nxt);
  document.getElementById('themeKnob').textContent=nxt==='dark'?'🌙':'☀️';
  localStorage.setItem('rfn_theme',nxt);
}

function goTab(tab){
  ['add','customers','service'].forEach(t=>{
    document.getElementById('v-'+t).style.display='none';
    document.getElementById('t-'+t).className='np';
  });
  document.getElementById('v-'+tab).style.display='block';
  const btn=document.getElementById('t-'+tab);
  if(tab==='add')btn.className='np on-add';
  else if(tab==='customers')btn.className='np on-cust';
  else btn.className='np on-svc';
  if(tab==='customers')renderList('customer');
  if(tab==='service')renderList('service');
}

function selType(type){
  curType=type;
  document.getElementById('tc-c').className='tcard'+(type==='customer'?' sc':'');
  document.getElementById('tc-s').className='tcard'+(type==='service'?' ss':'');
  document.getElementById('ck-c').textContent=type==='customer'?'✓':'';
  document.getElementById('ck-s').textContent=type==='service'?'✓':'';
  const btn=document.getElementById('savebtn');
  btn.className='save-btn '+(type==='customer'?'sb-c':'sb-s');
  document.getElementById('save-lbl').textContent=type==='customer'?'Save Customer':'Save Service Call';
}

function saveEntry(){
  const name=g('fn'),mobile=g('fm'),address=g('fa'),notes=g('fno');
  if(!name){sk('fn');tip('⚠ Name is required');return;}
  if(!mobile){sk('fm');tip('⚠ Mobile is required');return;}
  const entry={id:uid(),type:curType,name,mobile,address,notes,createdAt:new Date().toISOString()};
  records.unshift(entry);save();updateCounts();
  ['fn','fm','fa','fno'].forEach(id=>document.getElementById(id).value='');
  openSharePopup(entry.id,true);
}

function renderList(type,q=''){
  const lid=type==='customer'?'l-customers':'l-service';
  const mid=type==='customer'?'lm-c':'lm-s';
  let items=records.filter(r=>r.type===type);
  if(q){const lq=q.toLowerCase();items=items.filter(r=>r.name.toLowerCase().includes(lq)||r.mobile.includes(lq)||(r.address||'').toLowerCase().includes(lq)||(r.notes||'').toLowerCase().includes(lq));}
  document.getElementById(mid).textContent=`${items.length} ${items.length===1?'record':'records'}${q?' found':''}`;
  const el=document.getElementById(lid);
  if(!items.length){el.innerHTML=`<div class="empty"><div class="empty-ico">${type==='customer'?'👤':'🔧'}</div><div class="empty-title">${q?'No results found':'No entries yet'}</div><div class="empty-sub">${q?'Try different keywords':'Add entries from the New Entry tab'}</div></div>`;return;}
  el.innerHTML=items.map(r=>{
    const dt=new Date(r.createdAt);
    const ds=`${dt.getDate()} ${MO[dt.getMonth()]} · ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
    return `<div class="rcard ${r.type}" onclick="openSheet('${r.id}')">
      <div class="rbody">
        <div class="rtop">
          <div>
            <div class="rname">${x(r.name)}</div>
            <div class="rmob">📱 ${x(r.mobile)}</div>
          </div>
          <div class="rright">
            <span class="type-chip ${r.type==='customer'?'chip-cust':'chip-svc'}">${r.type==='customer'?'CUSTOMER':'SERVICE'}</span>
            <button class="del-ico" onclick="event.stopPropagation();delRecord('${r.id}','${r.type}')" title="Delete">🗑</button>
          </div>
        </div>
        ${r.address?`<div class="raddr">📍 ${x(r.address.split('\n')[0])}</div>`:''}
        ${r.notes?`<div class="rnotes">${x(r.notes)}</div>`:''}
        <div class="rfoot"><div class="rdate">🕐 ${ds}</div></div>
      </div>
      <button class="card-share" onclick="event.stopPropagation();openSharePopup('${r.id}')">↑ &nbsp;Share Entry</button>
    </div>`;
  }).join('');
}

function filterList(q,type){renderList(type,q);}

function openSheet(id){
  const r=records.find(a=>a.id===id);if(!r)return;
  const dt=new Date(r.createdAt);
  const ds=`${dt.getDate()} ${MO[dt.getMonth()]} ${dt.getFullYear()}, ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  const isCust=r.type==='customer';
  document.getElementById('sdot').style.background=isCust?'var(--cust)':'var(--svc)';
  document.getElementById('slbl').textContent=isCust?'New Customer':'Service Call';
  document.getElementById('sname').textContent=r.name;
  document.getElementById('sheet').className='sheet '+(isCust?'customer-sheet':'service-sheet');
  document.getElementById('sbody').innerHTML=`
    <div class="detail-grid">
      <div><div class="dkey">📱 Mobile</div><div class="dval">${x(r.mobile)}</div></div>
      ${r.address?`<div><div class="dkey">📍 Address</div><div class="dval">${x(r.address).replace(/\n/g,'<br>')}</div></div>`:''}
      ${r.notes?`<div><div class="dkey">📝 Notes</div><div class="dnotes">${x(r.notes).replace(/\n/g,'<br>')}</div></div>`:''}
      <div><div class="dkey">🕐 Recorded</div><div class="dval" style="font-size:14px;color:var(--t3)">${ds}</div></div>
    </div>
    <button class="sheet-share-btn" onclick="openSharePopup('${r.id}')">↑ &nbsp;Share ${x(r.name)}'s Details</button>
    <button class="sheet-del-btn" onclick="delRecord('${r.id}','${r.type}',true)">🗑 &nbsp;Delete Entry</button>`;
  document.getElementById('backdrop').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}
function closeSheet(){
  document.getElementById('backdrop').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
}

function openSharePopup(id,afterSave=false){
  const r=records.find(a=>a.id===id);if(!r)return;
  const chip=document.getElementById('sp-chip');
  chip.style.display=afterSave?'inline-flex':'none';
  chip.textContent='✓ '+(r.type==='customer'?'Customer':'Service Call')+' Saved!';
  document.getElementById('sp-title').textContent=afterSave?'Share with your team?':'Share Entry';
  document.getElementById('sp-sub').textContent=afterSave?`${r.name}'s details are saved. Share now?`:`Share ${r.name}'s details`;
  document.getElementById('sp-preview').textContent=fmtEntry(id).replace(/\*/g,'').replace(/_/g,'');
  document.getElementById('sp-wa').onclick=()=>{shareWA(id);closeSharePopup();afterSave&&tip('✓ Saved & shared via WhatsApp');};
  document.getElementById('sp-em').onclick=()=>{shareMail(id);closeSharePopup();afterSave&&tip('✓ Saved & shared via Email');};
  document.getElementById('sp-cp').onclick=()=>{copyEntry(id);closeSharePopup();};
  document.getElementById('sp-skip').onclick=()=>{if(afterSave)tip(r.type==='customer'?'✓ Customer saved!':'✓ Service call saved!');closeSharePopup();};
  document.getElementById('sp-back').classList.add('on');
  document.getElementById('sp-sheet').classList.add('on');
}
function closeSharePopup(){
  document.getElementById('sp-back').classList.remove('on');
  document.getElementById('sp-sheet').classList.remove('on');
}

function fmtEntry(id){
  const r=records.find(a=>a.id===id);if(!r)return'';
  const dt=new Date(r.createdAt);
  const ds=`${dt.getDate()} ${MO[dt.getMonth()]} ${dt.getFullYear()}, ${dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
  const hdr=r.type==='customer'?'🆕 NEW CUSTOMER':'🔧 SERVICE CALL';
  const sep='━'.repeat(26);
  let m=`*${hdr}*\n${sep}\n`;
  m+=`👤 *Name*    : ${r.name}\n`;
  m+=`📱 *Mobile* : ${r.mobile}\n`;
  if(r.address)m+=`📍 *Address*: ${r.address.replace(/\n/g,', ')}\n`;
  if(r.notes)m+=`📝 *Notes*  :\n${r.notes}\n`;
  m+=`${sep}\n🕐 *Saved* : ${ds}\n\n_Rajdeep Furnitures_`;
  return m;
}

function shareWA(id){window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(fmtEntry(id)),'_blank');}
function shareMail(id){
  const r=records.find(a=>a.id===id);if(!r)return;
  const subj=`Rajdeep Furnitures – ${r.type==='customer'?'New Customer':'Service Call'}: ${r.name}`;
  window.open(`mailto:?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(fmtEntry(id))}`,'_blank');
}
function copyEntry(id){
  const msg=fmtEntry(id);
  navigator.clipboard.writeText(msg).then(()=>tip('📋 Copied! Paste anywhere.')).catch(()=>{fallbackCopy(msg);tip('📋 Copied!');});
}
function fallbackCopy(t){const e=document.createElement('textarea');e.value=t;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);}

function delRecord(id,type,fromSheet){
  records=records.filter(r=>r.id!==id);save();updateCounts();
  if(fromSheet)closeSheet();renderList(type);tip('Entry deleted');
}

function save(){localStorage.setItem('rfn_records',JSON.stringify(records));}
function updateCounts(){
  document.getElementById('bc').textContent=records.filter(r=>r.type==='customer').length;
  document.getElementById('bs').textContent=records.filter(r=>r.type==='service').length;
}
function g(id){return document.getElementById(id).value.trim();}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function sk(id){const el=document.getElementById(id);el.style.animation='none';el.offsetHeight;el.style.animation='shake .35s ease';setTimeout(()=>el.style.animation='',400);}
function tip(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2600);}
</script>
</body>
</html>
